<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WispDraw Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #1e1e24; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: none; }
        
        #top-bar { background: #111; color: #fff; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; width: 100%; z-index: 20; display: flex; justify-content: center; align-items: center; cursor: pointer; user-select: none; }
        #status-bar { background: #111; color: #fff; padding: 4px; text-align: center; font-size: 11px; width: 100%; z-index: 20; opacity: 0.7; }
        
        #viewer-overlay { display: none; background: #ff4757; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; z-index: 20; width: 100%; height: 100vh; box-sizing: border-box; align-items: center; justify-content: center; flex-direction: column; position: absolute; top: 0; left: 0; }
        
        #win-overlay { display: none; background: rgba(46, 204, 113, 0.95); color: white; position: absolute; top:0; left:0; width:100%; height:100%; z-index: 30; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(8px); }
        .win-btn { padding: 14px 28px; font-size: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .win-btn:active { transform: scale(0.95); }
        
        #canvas-container { width: 100vw; height: 100vw; flex: none; position: relative; background: #ffffff; touch-action: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5) inset; overflow: hidden; border-radius: 0 0 10px 10px; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: top left; touch-action: none; }
        
        #toolbar { 
            position: relative; margin: 15px auto;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 12px; 
            justify-content: center; align-items: center; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); z-index: 10; 
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.4);
            width: 92%; box-sizing: border-box; 
        }
        
        button, select, input[type="range"], input[type="text"] { 
            padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); 
            font-weight: 600; font-size: 14px; background: #fff; color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); outline: none; transition: 0.2s;
        }
        button:active { background: #f0f0f0; transform: translateY(2px); }
        
        #palette { display: flex; align-items: center; justify-content: center; border-right: 2px solid rgba(0,0,0,0.1); padding-right: 12px; }
        .color-wheel-wrapper {
            position: relative; width: 42px; height: 42px; border-radius: 50%;
            background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
            box-shadow: 0 3px 10px rgba(0,0,0,0.2); cursor: pointer; border: 3px solid #fff;
            transition: transform 0.2s;
        }
        .color-wheel-wrapper:active { transform: scale(0.9); }
        .color-wheel-wrapper input[type="color"] {
            opacity: 0; width: 100%; height: 100%; position: absolute; top:0; left:0; cursor: pointer;
        }

        #brushSize { width: 140px; height: 16px; accent-color: #333; cursor: pointer; }
        #clearBtn { background: #ff4757; color: white; border: none; }
        
        #comments-wrapper { position: absolute; top: 15px; right: 15px; width: 220px; z-index: 15; pointer-events: none; }
        #comments-container { display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .comment {
            background: rgba(0,0,0,0.75); color: #fff; padding: 8px 12px; border-radius: 12px;
            font-size: 14px; word-wrap: break-word; animation: fadeIn 0.3s;
            backdrop-filter: blur(4px); box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .comment b { color: #feca57; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        #dialog-overlay { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:90; backdrop-filter: blur(2px); }
        #word-dialog { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#2c3e50; padding:20px; border-radius:15px; z-index:100; color:white; width: 85%; max-width: 320px; box-sizing: border-box; font-family: sans-serif; box-shadow:0 10px 40px rgba(0,0,0,0.6); }
        .dialog-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .dialog-title { margin: 0; font-size: 18px; font-weight: bold; text-align: left; line-height: 1.4; }
        .dialog-title span { color: #f1c40f; font-size: 24px; display: block; margin-top: 5px; }
        #closeDialogBtn { background: transparent; border: none; color: #aaa; font-size: 24px; font-weight: bold; padding: 0; margin-top: -5px; cursor: pointer; }
        #closeDialogBtn:active { color: white; transform: scale(0.9); }
        
        #word-dialog button.action-btn { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; padding: 12px 20px; width: 100%; margin-bottom: 10px; font-size: 16px; color: white; transition: 0.2s; text-align: center; }
        #word-dialog button.action-btn:active { transform: scale(0.97); }
        #nextWordBtn { background: #3498db; }
        #writeWordBtn { background: #2ecc71; margin-bottom: 0; }
        
        #word-input-container { display: none; }
        #customWordInput { width: 100%; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; outline: none; text-align: center; color: #333; }
        #saveCustomWordBtn { background: #e67e22; margin-bottom: 0; }
    </style>
</head>
<body>
    <div id="top-bar" onclick="openWordDialog()">
        Your word: &nbsp;<span id="current-word-display">Loading...</span> &nbsp;⚙️
    </div>
    <div id="status-bar"><span id="syncText">🟡 Waiting...</span></div>
    
    <div id="dialog-overlay" onclick="closeWordDialog()"></div>
    <div id="word-dialog">
        <div class="dialog-header">
            <div class="dialog-title">Your word: <br><span id="dialog-word-text">Loading...</span></div>
            <button id="closeDialogBtn" onclick="closeWordDialog()">✖</button>
        </div>
        
        <div id="word-buttons">
            <button id="nextWordBtn" class="action-btn">Next Word ⏭️</button>
            <button id="writeWordBtn" class="action-btn">Write Custom Word ✍️</button>
        </div>
        
        <div id="word-input-container">
            <p style="margin:0 0 10px 0; font-size:15px; color:#ddd; text-align:left;">Write your word here:</p>
            <input type="text" id="customWordInput" placeholder="Type a word...">
            <button id="saveCustomWordBtn" class="action-btn">Set Word</button>
        </div>
    </div>

    <div id="viewer-overlay">
        <p>👁️ VIEWER MODE</p>
        <p>Watching live drawing...</p>
    </div>
    
    <div id="win-overlay">
        <h1 style="margin:0; font-size:60px;">🎉</h1>
        <p id="win-text" style="font-size: 24px; margin: 20px 0; line-height: 1.4; text-shadow: 0 2px 4px rgba(0,0,0,0.2);"></p>
        <p style="font-size: 18px; margin-bottom: 30px; font-weight: bold;">Would you like to keep drawing?</p>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button id="keepDrawingBtn" class="win-btn" style="background: white; color: #2ecc71;">Keep drawing</button>
            <button id="closeCanvasBtn" class="win-btn" style="background: #e74c3c; color: white;">Close Canvas</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="board"></canvas>
        <div id="comments-wrapper">
            <div style="display: flex; justify-content: flex-end; pointer-events: auto; margin-bottom: 5px;">
                <button id="toggleCommentsBtn" style="padding: 6px 10px; border-radius: 8px; background: rgba(0,0,0,0.6); color: white; border: none; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px);">🔽 Hide</button>
            </div>
            <div id="comments-container"></div> 
        </div>
    </div>
    
    <div id="toolbar">
        <div id="palette">
            <div class="color-wheel-wrapper" title="Choose Color">
                <input type="color" id="colorPicker" value="#000000">
            </div>
        </div>
        
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <select id="toolSelect">
            <option value="solid">🖌️ Solid Brush</option>
            <option value="fill">🪣 Fill Color</option>
            <option value="airbrush">💨 Airbrush</option>
            <option value="velvet">🖍️ Velvet</option>
            <option value="wet">🖌️ Wet Brush</option>
            <option value="spray">💨 Spray</option>
            <option value="eraser">🧽 Eraser</option>
            <option value="line">📏 Line</option>
            <option value="rect">🔲 Rectangle</option>
            <option value="circle">⭕ Circle</option>
        </select>
        
        <button id="undoBtn">↩️ Undo</button>
        <button id="redoBtn">↪️ Redo</button>
        <button id="clearBtn">🗑️ Clear</button>
    </div>

    <script>
        // ----------------------------------------------------
        // IMPORTANT: Update this token with your actual bot token!
        window.TG_BOT_TOKEN = "YOUR_BOT_TOKEN_HERE"; 
        // ----------------------------------------------------
        
        // --- ANTI SPAM SYSTEM ---
        let spamCooldowns = {};
        function checkSpam(actionId, cooldownMs) {
            const now = Date.now();
            if (now - (spamCooldowns[actionId] || 0) < cooldownMs) return false;
            spamCooldowns[actionId] = now;
            return true;
        }

        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes();
        
        const startParam = tg.initDataUnsafe?.start_param || "0_0_0_0";
        
        if (startParam === "ended") {
            document.getElementById('toolbar').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'none';
            document.getElementById('status-bar').style.display = 'none';
            document.getElementById('top-bar').style.display = 'none';
            const overlay = document.getElementById('viewer-overlay');
            overlay.style.display = 'flex';
            overlay.style.background = '#1e1e24';
            overlay.innerHTML = '<h1 style="margin:0; font-size:50px;">🛑</h1><p>Game is over.</p>';
            throw new Error("Game Over"); 
        }
        
        const params = startParam.split("_");
        const chatId = params[0];
        const drawerId = parseInt(params[1]); 
        const startTime = params[2]; 
        const mainMsgId = params[3]; 
        
        const actualUserId = tg.initDataUnsafe?.user?.id || 0; 
        const isDrawer = (actualUserId === drawerId || actualUserId === 0); 
        const drawerName = tg.initDataUnsafe?.user?.first_name || 'Player';

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('canvas-container');
        const syncText = document.getElementById('syncText');
        
        let gameIsActive = true;
        let keepDrawing = false; 

        if (!isDrawer) {
            document.getElementById('top-bar').style.display = 'none';
        }

        function sendBotCommand(cmd) {
            if (!checkSpam('ntfy_call', 1000)) return; 
            fetch(`https://ntfy.envs.net/WispDraw_Up_Global`, {
                method: 'POST',
                body: `${chatId}|${drawerId}|${startTime}|${cmd}`
            }).catch(()=>{});
        }

        function openWordDialog() {
            if(!isDrawer || !gameIsActive) return;
            if (!checkSpam('open_dialog', 500)) return; 
            
            document.getElementById('dialog-overlay').style.display = 'block';
            document.getElementById('word-dialog').style.display = 'block';
            document.getElementById('word-buttons').style.display = 'block';
            document.getElementById('word-input-container').style.display = 'none';
            document.getElementById('customWordInput').value = '';
        }
        
        function closeWordDialog() {
            document.getElementById('dialog-overlay').style.display = 'none';
            document.getElementById('word-dialog').style.display = 'none';
        }

        document.getElementById('nextWordBtn').onclick = () => {
            if (!checkSpam('next_word_btn', 1500)) return;
            sendBotCommand('NEXT');
            document.getElementById('dialog-word-text').innerText = "Changing...";
            setTimeout(closeWordDialog, 500);
        };

        document.getElementById('writeWordBtn').onclick = () => {
            document.getElementById('word-buttons').style.display = 'none';
            document.getElementById('word-input-container').style.display = 'block';
            document.getElementById('customWordInput').focus();
        };

        document.getElementById('saveCustomWordBtn').onclick = () => {
            if (!checkSpam('save_word_btn', 1500)) return;
            const newWord = document.getElementById('customWordInput').value.trim();
            if(newWord) {
                sendBotCommand(`SETWORD|${newWord}`);
                document.getElementById('current-word-display').innerText = newWord;
                document.getElementById('dialog-word-text').innerText = newWord;
                closeWordDialog();
            }
        };

        let commentsVisible = true;
        document.getElementById('toggleCommentsBtn').onclick = (e) => {
            commentsVisible = !commentsVisible;
            document.getElementById('comments-container').style.display = commentsVisible ? 'flex' : 'none';
            e.target.innerText = commentsVisible ? '🔽 Hide' : '🔼 Show';
        };

        document.getElementById('colorPicker').addEventListener('input', () => {
            let tool = document.getElementById('toolSelect').value;
            if (tool === 'eraser') document.getElementById('toolSelect').value = 'solid';
        });

        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerWidth * dpr;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerWidth + 'px';
        
        if (!isDrawer) {
            document.getElementById('toolbar').style.display = 'none';
            document.getElementById('viewer-overlay').style.display = 'flex';
        }
        
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let history = [canvas.toDataURL()];
        let historyStep = 0;
        
        const storageKey = `canvas_${chatId}_${startTime}`;
        const photoKey = `lastPhoto_${chatId}_${startTime}`;
        let lastSentPhotoId = localStorage.getItem(photoKey) || null;

        if (isDrawer) {
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith(`canvas_${chatId}_`) && key !== storageKey) localStorage.removeItem(key);
                if (key.startsWith(`lastPhoto_${chatId}_`) && key !== photoKey) localStorage.removeItem(key);
            });

            let saved = localStorage.getItem(storageKey);
            if (saved) {
                let img = new Image();
                img.src = saved;
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    history = [canvas.toDataURL()];
                    historyStep = 0;
                };
            }
        }

        function saveState() {
            historyStep++;
            history = history.slice(0, historyStep);
            const currentData = canvas.toDataURL();
            history.push(currentData);
            if (isDrawer && (gameIsActive || keepDrawing)) localStorage.setItem(storageKey, currentData);
        }

        document.getElementById('undoBtn').onclick = () => {
            if(historyStep > 0 && (gameIsActive || keepDrawing)) {
                historyStep--;
                let img = new Image(); img.src = history[historyStep];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); }
            }
        };

        document.getElementById('redoBtn').onclick = () => {
            if(historyStep < history.length - 1 && (gameIsActive || keepDrawing)) {
                historyStep++;
                let img = new Image(); img.src = history[historyStep];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); }
            }
        };
        
        document.getElementById('clearBtn').onclick = () => { 
            if(gameIsActive || keepDrawing){ ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); }
        };

        function dataURLtoFile(dataurl, filename) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
            let bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--) u8arr[n] = bstr.charCodeAt(n);
            return new File([u8arr], filename, {type:mime});
        }
        
        document.getElementById('keepDrawingBtn').onclick = () => {
            if (!checkSpam('keep_drawing_btn', 2000)) return; 
            document.getElementById('win-overlay').style.display = 'none';
            keepDrawing = true; 
        };

        document.getElementById('closeCanvasBtn').onclick = () => {
            if (!checkSpam('close_canvas_btn', 3000)) return; 

            if (keepDrawing && window.TG_BOT_TOKEN && window.finalMessageId) {
                const file = dataURLtoFile(canvas.toDataURL('image/jpeg', 0.8), 'drawing.jpg');
                const editData = new FormData();
                editData.append('chat_id', chatId);
                editData.append('message_id', window.finalMessageId);
                editData.append('media', JSON.stringify({
                    type: 'photo', media: 'attach://drawing', 
                    caption: `🎨 <b>Final Masterpiece!</b>\nWord was: <b>${window.finalWord}</b>`, 
                    parse_mode: 'HTML'
                }));
                editData.append('drawing', file);
                fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/editMessageMedia`, {method: 'POST', body: editData})
                .then(() => tg.close()).catch(() => tg.close());
            } else {
                tg.close();
            }
        };

        const evtSource = new EventSource(`https://ntfy.envs.net/WispDraw_${chatId}_${startTime}/sse`);
        let comments = [];

        evtSource.onmessage = function(e) {
            try {
                const parsed = JSON.parse(e.data);
                if (parsed.event !== "message") return;
                const data = parsed.message;

                if (data.startsWith("DEAD|")) {
                    if (keepDrawing) return; 
                    gameIsActive = false;
                    keepDrawing = false;
                    document.getElementById('toolbar').style.display = 'none';
                    document.getElementById('top-bar').style.display = 'none';
                    const overlay = document.getElementById('viewer-overlay');
                    overlay.style.display = 'flex';
                    overlay.style.background = '#ff4757';
                    overlay.innerHTML = `<h1 style="margin:0; font-size:50px;">🛑</h1><p style="padding: 0 20px;">Game over!</p>`;
                }

                if (data.startsWith("WORD|")) {
                    const word = data.split("|")[1];
                    document.getElementById('current-word-display').innerText = word;
                    document.getElementById('dialog-word-text').innerText = word;
                }
                
                if (data.startsWith("MSG|")) {
                    const parts = data.split("|");
                    comments.push(`<b>${parts[1]}:</b> ${parts.slice(2).join("|")}`);
                    if (comments.length > 5) comments.shift();
                    document.getElementById("comments-container").innerHTML = comments.map(c => `<div class="comment">${c}</div>`).join("");
                }
                
                if (data.startsWith("WIN|")) {
                    const parts = data.split("|");
                    gameIsActive = false; 
                    window.finalWord = parts.slice(2).join("|");
                    
                    if (isDrawer) {
                        document.getElementById('top-bar').style.display = 'none';
                        document.getElementById('win-overlay').style.display = 'flex';
                        document.getElementById('win-text').innerHTML = `<b>${parts[1]}</b> found the word!<br><br>Word: <b>${window.finalWord}</b>`;
                        
                        if (window.TG_BOT_TOKEN) {
                            if (lastSentPhotoId) {
                                fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/deleteMessage?chat_id=${chatId}&message_id=${lastSentPhotoId}`);
                            }
                            const file = dataURLtoFile(canvas.toDataURL('image/jpeg', 0.9), 'final.jpg');
                            const sendData = new FormData();
                            sendData.append('chat_id', chatId);
                            sendData.append('photo', file);
                            sendData.append('caption', `🎨 <b>Final Masterpiece!</b>\nWord was: <b>${window.finalWord}</b>`);
                            sendData.append('parse_mode', 'HTML');
                            fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: sendData })
                            .then(r => r.json())
                            .then(res => {
                                if (res.ok) window.finalMessageId = res.result.message_id; 
                            });
                        }
                    } else {
                        document.getElementById('toolbar').style.display = 'none';
                        const overlay = document.getElementById('viewer-overlay');
                        overlay.style.display = 'flex';
                        overlay.style.background = '#2ecc71';
                        overlay.innerHTML = `<h1 style="margin:0; font-size:60px;">🎉</h1><p>${parts[1]} guessed it!</p><p>Word: <b>${window.finalWord}</b></p>`;
                    }
                }
                
                if (data.startsWith("HINT|")) {
                    if (isDrawer && window.TG_BOT_TOKEN && (gameIsActive || keepDrawing)) {
                        const parts = data.split("|");
                        const hintMsgId = parts[1];
                        const turnName = parts[2];
                        const file = dataURLtoFile(canvas.toDataURL('image/jpeg', 0.7), 'hint.jpg');
                        const sendData = new FormData();
                        sendData.append('chat_id', chatId);
                        sendData.append('photo', file);
                        sendData.append('caption', `🔎 Hints:\n\n🎨 ${turnName} is drawing`);
                        sendData.append('reply_to_message_id', hintMsgId);
                        fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: sendData });
                    }
                }
                
                if (data.startsWith("END|")) {
                    gameIsActive = false;
                    keepDrawing = false;
                    document.getElementById('toolbar').style.display = 'none';
                    document.getElementById('top-bar').style.display = 'none';
                    const overlay = document.getElementById('viewer-overlay');
                    overlay.style.display = 'flex';
                    overlay.style.background = '#ff4757';
                    overlay.innerHTML = `<h1 style="margin:0; font-size:50px;">🛑</h1><p>Game Ended!</p>`;
                }
            } catch(err) {}
        };

        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        const syncTopic = `WispDrawBot/chat/${chatId}_${startTime}`;

        client.on('connect', () => {
            if (!isDrawer) {
                syncText.innerText = "🔵 Connected! Waiting for drawer...";
                client.subscribe(syncTopic);
                sendBotCommand('CHECK'); 
            } else {
                syncText.innerText = "🟢 Sync Active";
                sendBotCommand('OPENED'); 
            }
        });

        if (!isDrawer) {
            client.on('message', (topic, message) => {
                let img = new Image(); img.src = message.toString();
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
                syncText.innerText = "🟢 Live Syncing...";
            });
            initZoom();
        } else {
            initDrawing();
            initZoom();
            
            setInterval(() => {
                if (client.connected && (gameIsActive || keepDrawing)) client.publish(syncTopic, canvas.toDataURL('image/jpeg', 0.5));
            }, 2000);

            function sendLivePhoto(captionType) {
                if (!window.TG_BOT_TOKEN || !gameIsActive) return;

                const file = dataURLtoFile(canvas.toDataURL('image/jpeg', 0.8), 'drawing.jpg');
                let captionText = captionType === 'initial' ? "<b>Live Drawing...</b> 🖌️" : `<b><a href="tg://user?id=${drawerId}">${drawerName}</a></b> is drawing 🎨\n\nGuess the word!`;
                
                const sendData = new FormData();
                sendData.append('chat_id', chatId);
                sendData.append('photo', file);
                sendData.append('caption', captionText);
                sendData.append('parse_mode', 'HTML');
                sendData.append('reply_to_message_id', mainMsgId); 
                sendData.append('reply_markup', JSON.stringify({
                    inline_keyboard: [[{text: "🎨 Open Canvas", url: `https://t.me/Crocodilegameebot/CROCO?startapp=${chatId}_${drawerId}_${startTime}_${mainMsgId}` }]]
                }));

                fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/sendPhoto`, { method: 'POST', body: sendData })
                .then(r => r.json())
                .then(data => {
                    if(data.ok) {
                        syncText.innerText = "🟢 Sent Photo";
                        if (lastSentPhotoId) fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/deleteMessage?chat_id=${chatId}&message_id=${lastSentPhotoId}`);
                        lastSentPhotoId = data.result.message_id; 
                        localStorage.setItem(photoKey, lastSentPhotoId);
                    } else {
                        if (data.description && data.description.includes("not found")) gameIsActive = false; 
                    }
                });
            }

            const initialSentKey = `initSent_${chatId}_${startTime}`;
            
            if (!localStorage.getItem(initialSentKey)) {
                sendLivePhoto('initial');
                localStorage.setItem(initialSentKey, "true");
                
                setTimeout(() => {
                    if (gameIsActive) {
                        sendLivePhoto('update');
                        setInterval(() => { if (gameIsActive) sendLivePhoto('update'); }, 60000);
                    }
                }, 15000);
            } else {
                setInterval(() => { if (gameIsActive) sendLivePhoto('update'); }, 60000);
            }

            let lastCanvasData = ""; 

            setInterval(() => {
                if (window.TG_BOT_TOKEN) {
                    const currentData = canvas.toDataURL('image/jpeg', 0.8);
                    if (currentData === lastCanvasData) return; 
                    
                    if (gameIsActive && lastSentPhotoId) {
                        const file = dataURLtoFile(currentData, 'drawing.jpg');
                        const editData = new FormData();
                        editData.append('chat_id', chatId);
                        editData.append('message_id', lastSentPhotoId);
                        editData.append('media', JSON.stringify({
                            type: 'photo', media: 'attach://drawing', 
                            caption: `<b><a href="tg://user?id=${drawerId}">${drawerName}</a></b> is drawing 🎨\n\nGuess the word!`, 
                            parse_mode: 'HTML'
                        }));
                        editData.append('drawing', file);
                        editData.append('reply_markup', JSON.stringify({
                            inline_keyboard: [[{text: "🎨 Open Canvas", url: `https://t.me/Crocodilegameebot/CROCO?startapp=${chatId}_${drawerId}_${startTime}_${mainMsgId}` }]]
                        }));
                        fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/editMessageMedia`, {method: 'POST', body: editData});
                        lastCanvasData = currentData;
                        
                    } else if (keepDrawing && window.finalMessageId) {
                        const file = dataURLtoFile(currentData, 'drawing.jpg');
                        const editData = new FormData();
                        editData.append('chat_id', chatId);
                        editData.append('message_id', window.finalMessageId);
                        editData.append('media', JSON.stringify({
                            type: 'photo', media: 'attach://drawing', 
                            caption: `🎨 <b>Final Masterpiece!</b>\nWord was: <b>${window.finalWord}</b>`, 
                            parse_mode: 'HTML'
                        }));
                        editData.append('drawing', file);
                        fetch(`https://api.telegram.org/bot${window.TG_BOT_TOKEN}/editMessageMedia`, {method: 'POST', body: editData});
                        lastCanvasData = currentData;
                    }
                }
            }, 5000);
        }

        function hexToRgb(hex) {
            let r = 0, g = 0, b = 0;
            if(hex.length == 7){
                r = parseInt(hex.substring(1,3), 16);
                g = parseInt(hex.substring(3,5), 16);
                b = parseInt(hex.substring(5,7), 16);
            }
            return [r, g, b, 255];
        }

        function floodFill(x, y, fillColor) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const stack = [[Math.floor(x), Math.floor(y)]];
            const startPos = (Math.floor(y) * canvas.width + Math.floor(x)) * 4;
            const startR = data[startPos];
            const startG = data[startPos+1];
            const startB = data[startPos+2];
            const startA = data[startPos+3];

            if (startR === fillColor[0] && startG === fillColor[1] && startB === fillColor[2] && startA === fillColor[3]) return;

            const matchStartColor = (pos) => {
                return data[pos] === startR && data[pos+1] === startG && data[pos+2] === startB && data[pos+3] === startA;
            };

            const colorPixel = (pos) => {
                data[pos] = fillColor[0];
                data[pos+1] = fillColor[1];
                data[pos+2] = fillColor[2];
                data[pos+3] = 255;
            };

            while (stack.length) {
                let [cx, cy] = stack.pop();
                let pos = (cy * canvas.width + cx) * 4;
                
                while (cy >= 0 && matchStartColor(pos)) {
                    cy--;
                    pos -= canvas.width * 4;
                }
                cy++;
                pos += canvas.width * 4;

                let reachLeft = false;
                let reachRight = false;

                while (cy < canvas.height && matchStartColor(pos)) {
                    colorPixel(pos);

                    if (cx > 0) {
                        if (matchStartColor(pos - 4)) {
                            if (!reachLeft) {
                                stack.push([cx - 1, cy]);
                                reachLeft = true;
                            }
                        } else if (reachLeft) {
                            reachLeft = false;
                        }
                    }

                    if (cx < canvas.width - 1) {
                        if (matchStartColor(pos + 4)) {
                            if (!reachRight) {
                                stack.push([cx + 1, cy]);
                                reachRight = true;
                            }
                        } else if (reachRight) {
                            reachRight = false;
                        }
                    }

                    cy++;
                    pos += canvas.width * 4;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        let drawing = false;
        let isZooming = false;
        let startX, startY;
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        let tempCtx = tempCanvas.getContext('2d');
        
        let scale = 1;
        let panX = 0;
        let panY = 0;

        function initDrawing() {
            container.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'touch' && !e.isPrimary) return;
                if (isZooming || (e.touches && e.touches.length > 1) || (!gameIsActive && !keepDrawing)) return;
                
                const rect = canvas.getBoundingClientRect();
                
                startX = (e.clientX - rect.left) * (canvas.width / rect.width);
                startY = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                let tool = document.getElementById('toolSelect').value;
                if (tool === 'fill') {
                    floodFill(startX, startY, hexToRgb(document.getElementById('colorPicker').value));
                    saveState();
                    return;
                }

                drawing = true;
                tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height); 
            });

            container.addEventListener('pointermove', (e) => {
                if (!drawing || isZooming || (!gameIsActive && !keepDrawing)) return;
                const rect = canvas.getBoundingClientRect();
                
                const currentX = (e.clientX - rect.left) * (canvas.width / rect.width);
                const currentY = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                let tool = document.getElementById('toolSelect').value;
                let color = tool === 'eraser' ? 'white' : document.getElementById('colorPicker').value;
                let size = document.getElementById('brushSize').value * dpr;

                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = size;
                
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;

                if (tool === 'velvet') {
                    ctx.globalAlpha = 0.7;
                    ctx.shadowBlur = 2;
                    ctx.shadowColor = color;
                } else if (tool === 'wet') {
                    ctx.globalAlpha = 0.15;
                    ctx.shadowBlur = size * 0.8;
                    ctx.shadowColor = color;
                }

                if (tool === 'spray') {
                    ctx.fillStyle = color;
                    let density = Math.max(10, size * 2.5);
                    for (let i = 0; i < density; i++) {
                        let rad = size * Math.sqrt(Math.random());
                        let angle = Math.random() * 2 * Math.PI;
                        let px = currentX + rad * Math.cos(angle);
                        let py = currentY + rad * Math.sin(angle);
                        ctx.globalAlpha = Math.random() * 0.6 + 0.2;
                        ctx.fillRect(px, py, 1.5, 1.5);
                    }
                    startX = currentX; startY = currentY;
                } else if (['solid', 'airbrush', 'eraser', 'velvet', 'wet'].includes(tool)) {
                    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(currentX, currentY);
                    if(tool === 'airbrush') { ctx.shadowBlur = size * 2; ctx.shadowColor = color; }
                    ctx.stroke(); startX = currentX; startY = currentY;
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height); ctx.beginPath();
                    if (tool === 'line') { ctx.moveTo(startX, startY); ctx.lineTo(currentX, currentY); ctx.stroke(); }
                    if (tool === 'rect') { ctx.rect(startX, startY, currentX - startX, currentY - startY); ctx.stroke(); }
                    if (tool === 'circle') { ctx.arc(startX, startY, Math.abs(currentX - startX), 0, Math.PI * 2); ctx.stroke(); }
                }
            });

            container.addEventListener('pointerup', () => { 
                if(drawing && (gameIsActive || keepDrawing)) { 
                    drawing = false; 
                    
                    if (['line', 'rect', 'circle'].includes(document.getElementById('toolSelect').value)) {
                        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
                        tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
                    }
                    
                    history = history.slice(0, historyStep + 1); 
                    saveState(); 
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1.0;
                    ctx.globalCompositeOperation = 'source-over';
                } 
            });
        }

        function initZoom() {
            let initialDistance = null;
            let initialScale = 1;
            let startPanX = 0;
            let startPanY = 0;
            let startMidX = 0;
            let startMidY = 0;

            container.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    isZooming = true;
                    drawing = false;
                    let t1 = e.touches[0], t2 = e.touches[1];
                    initialDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                    initialScale = scale;
                    startPanX = panX; startPanY = panY;
                    startMidX = (t1.clientX + t2.clientX) / 2; startMidY = (t1.clientY + t2.clientY) / 2;
                }
            });
            
            container.addEventListener('touchmove', e => {
                if (e.touches.length === 2 && initialDistance) {
                    e.preventDefault();
                    let t1 = e.touches[0], t2 = e.touches[1];
                    let currentDistance = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
                    let newScale = Math.min(Math.max(1, initialScale * (currentDistance / initialDistance)), 5); 
                    
                    let currentMidX = (t1.clientX + t2.clientX) / 2; let currentMidY = (t1.clientY + t2.clientY) / 2;
                    let deltaX = currentMidX - startMidX; let deltaY = currentMidY - startMidY;
                    let rect = container.getBoundingClientRect();
                    let pointX = startMidX - rect.left - startPanX; let pointY = startMidY - rect.top - startPanY;
                    let pX = startPanX + deltaX - pointX * (newScale / initialScale - 1);
                    let pY = startPanY + deltaY - pointY * (newScale / initialScale - 1);
                    
                    if (newScale === 1) { pX = 0; pY = 0; }
                    let minPanX = rect.width * (1 - newScale); let minPanY = rect.height * (1 - newScale);
                    
                    panX = Math.max(minPanX, Math.min(0, pX)); panY = Math.max(minPanY, Math.min(0, pY));
                    scale = newScale;
                    canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                }
            });
            container.addEventListener('touchend', (e) => { 
                if (e.touches.length < 2) {
                    isZooming = false;
                    initialDistance = null; 
                }
            });
        }
    </script>
